<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zelta Premium — CRM Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --bg2: #1a1a21;
      --bg3: #22222b;
      --bg4: #2c2c38;
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.15);
      --gold-border: rgba(201,169,110,0.3);
      --text: #f0ebe3;
      --text2: #9a9590;
      --text3: #5e5a55;
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.15);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.15);
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.15);
      --orange: #fb923c;
      --orange-dim: rgba(251,146,60,0.15);
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.15);
      --cyan: #22d3ee;
      --cyan-dim: rgba(34,211,238,0.15);
      --border: rgba(255,255,255,0.06);
      --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* Header */
    .header { background:var(--bg2); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .header-brand { font-size:18px; font-weight:700; color:var(--gold); letter-spacing:2px; }
    .header-brand span { font-weight:400; font-size:13px; color:var(--text2); margin-left:12px; letter-spacing:0; }
    .header-actions { display:flex; gap:8px; align-items:center; }
    .btn { padding:8px 16px; border-radius:8px; border:none; font-size:13px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
    .btn-gold { background:var(--gold); color:var(--bg); }
    .btn-gold:hover { opacity:0.9; }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
    .btn-outline:hover { border-color:var(--gold-border); color:var(--text); }
    .btn-red { background:var(--red-dim); color:var(--red); border:1px solid rgba(248,113,113,0.3); }
    .btn-red:hover { background:rgba(248,113,113,0.25); }
    .btn-sm { padding:5px 10px; font-size:11px; border-radius:6px; }
    .btn-green { background:var(--green-dim); color:var(--green); border:1px solid rgba(74,222,128,0.3); }

    /* Tabs */
    .tabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg2); padding:0 24px; }
    .tab { padding:12px 20px; font-size:13px; font-weight:500; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
    .tab:hover { color:var(--text2); }
    .tab.active { color:var(--gold); border-bottom-color:var(--gold); }

    /* Stats Row */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; padding:16px 24px; }
    .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
    .stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .stat-value { font-size:24px; font-weight:700; color:var(--text); }
    .stat-value.gold { color:var(--gold); }

    /* Voronka / Pipeline */
    .pipeline-container { padding:16px 24px; overflow-x:auto; }
    .pipeline { display:flex; gap:12px; min-width:max-content; }
    .pipeline-stage { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); width:220px; min-height:400px; flex-shrink:0; }
    .pipeline-stage-header { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .pipeline-stage-title { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
    .pipeline-stage-count { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; }
    .pipeline-stage-body { padding:8px; min-height:300px; }

    /* Pipeline card */
    .pipe-card { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:8px; cursor:pointer; transition:all 0.15s; }
    .pipe-card:hover { border-color:var(--gold-border); background:var(--bg4); }
    .pipe-card-name { font-size:13px; font-weight:600; margin-bottom:4px; }
    .pipe-card-phone { font-size:12px; color:var(--gold); margin-bottom:6px; }
    .pipe-card-meta { display:flex; justify-content:space-between; align-items:center; }
    .pipe-card-time { font-size:10px; color:var(--text3); }
    .pipe-card-sla { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; }
    .sla-green { background:var(--green-dim); color:var(--green); }
    .sla-yellow { background:var(--orange-dim); color:var(--orange); }
    .sla-red { background:var(--red-dim); color:var(--red); animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .pipe-card-contact { display:flex; align-items:center; gap:4px; margin-top:6px; font-size:10px; }
    .contact-yes { color:var(--green); }
    .contact-no { color:var(--red); }

    /* Filters */
    .filters { padding:12px 24px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .filter-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.15s; }
    .filter-btn.active { background:var(--gold-dim); border-color:var(--gold-border); color:var(--gold); }
    .filter-btn:hover { border-color:var(--gold-border); }
    .search-input { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-size:13px; font-family:'Inter',sans-serif; outline:none; min-width:220px; margin-left:auto; }
    .search-input:focus { border-color:var(--gold-border); }
    .search-input::placeholder { color:var(--text3); }

    /* Table */
    .table-wrap { padding:0 24px 24px; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:10px 12px; font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
    td { padding:10px 12px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; white-space:nowrap; }
    tr:hover td { background:var(--bg2); }
    .lead-id { color:var(--gold); font-weight:500; cursor:pointer; }
    .lead-id:hover { text-decoration:underline; }

    /* Status badges */
    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; white-space:nowrap; }
    .badge-new { background:var(--blue-dim); color:var(--blue); }
    .badge-render_ready { background:var(--purple-dim); color:var(--purple); }
    .badge-offer_sent { background:var(--cyan-dim); color:var(--cyan); }
    .badge-called { background:var(--orange-dim); color:var(--orange); }
    .badge-showroom { background:var(--gold-dim); color:var(--gold); }
    .badge-deposit { background:var(--green-dim); color:var(--green); }
    .badge-closed { background:rgba(74,222,128,0.3); color:#22c55e; }
    .badge-lost { background:var(--red-dim); color:var(--red); }

    /* Photos */
    .photo-thumbs { display:flex; gap:4px; }
    .photo-thumb { width:32px; height:32px; border-radius:6px; object-fit:cover; border:1px solid var(--border); cursor:pointer; }
    .photo-thumb:hover { border-color:var(--gold); }

    /* SLA Timer in table */
    .sla-timer { font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; }
    .sla-timer.green { color:var(--green); }
    .sla-timer.yellow { color:var(--orange); }
    .sla-timer.red { color:var(--red); }
    .sla-timer.done { color:var(--green); }
    .sla-timer.breach { color:var(--red); }

    /* Action buttons in table */
    .action-btns { display:flex; gap:4px; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; max-width:680px; width:100%; max-height:90vh; overflow-y:auto; padding:24px; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .modal-title { font-size:18px; font-weight:600; }
    .modal-close { background:none; border:none; color:var(--text2); font-size:24px; cursor:pointer; padding:4px; }
    .modal-close:hover { color:var(--text); }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .detail-item { padding:10px 12px; background:var(--bg3); border-radius:8px; }
    .detail-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .detail-value { font-size:14px; color:var(--text); font-weight:500; }
    .detail-value a { color:var(--gold); text-decoration:none; }
    .detail-value a:hover { text-decoration:underline; }
    .detail-full { grid-column:1/-1; }
    .detail-photos { display:flex; gap:8px; margin:16px 0; }
    .detail-photo { width:100px; height:130px; border-radius:10px; object-fit:cover; border:1px solid var(--border); cursor:pointer; }
    .detail-photo:hover { border-color:var(--gold); }

    /* SLA big display in modal */
    .sla-display { text-align:center; padding:16px; background:var(--bg3); border-radius:12px; margin:16px 0; }
    .sla-display-label { font-size:11px; color:var(--text3); text-transform:uppercase; margin-bottom:6px; }
    .sla-display-timer { font-size:32px; font-weight:700; font-variant-numeric:tabular-nums; }
    .sla-display-sub { font-size:12px; margin-top:4px; }

    /* Contact toggle */
    .contact-toggle { display:flex; gap:8px; margin:12px 0; }
    .contact-toggle-btn { flex:1; padding:10px; border-radius:8px; border:2px solid var(--border); background:var(--bg3); color:var(--text2); font-size:13px; font-weight:500; cursor:pointer; text-align:center; transition:all 0.15s; font-family:'Inter',sans-serif; }
    .contact-toggle-btn.active-yes { border-color:var(--green); background:var(--green-dim); color:var(--green); }
    .contact-toggle-btn.active-no { border-color:var(--red); background:var(--red-dim); color:var(--red); }

    /* Voronka select */
    .voronka-select { width:100%; padding:10px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; font-family:'Inter',sans-serif; outline:none; cursor:pointer; }
    .voronka-select:focus { border-color:var(--gold-border); }
    .voronka-select option { background:var(--bg2); color:var(--text); }

    .notes-area { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-size:13px; font-family:'Inter',sans-serif; outline:none; width:100%; min-height:80px; resize:vertical; }
    .notes-area:focus { border-color:var(--gold-border); }

    .manager-input { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:13px; font-family:'Inter',sans-serif; outline:none; width:100%; }
    .manager-input:focus { border-color:var(--gold-border); }

    .modal-actions { display:flex; gap:10px; margin-top:20px; }

    /* Status history */
    .status-history { margin-top:16px; }
    .status-history-item { font-size:12px; color:var(--text3); padding:4px 0; display:flex; gap:8px; }
    .status-history-item .arrow { color:var(--gold); }

    /* Section label */
    .section-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin:16px 0 8px; }

    /* Confirm modal */
    .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; }
    .confirm-overlay.open { display:flex; }
    .confirm-box { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:24px; max-width:380px; width:90%; text-align:center; }
    .confirm-box p { font-size:14px; color:var(--text2); margin:12px 0 20px; }
    .confirm-box h3 { font-size:16px; color:var(--text); }
    .confirm-actions { display:flex; gap:10px; justify-content:center; }

    /* Tab content */
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    /* Responsive */
    @media (max-width:768px) {
      .stats-row { grid-template-columns:1fr 1fr; }
      .filters { flex-direction:column; }
      .search-input { margin-left:0; width:100%; }
      .header { padding:12px 16px; }
      .table-wrap { padding:0 12px 16px; }
      .detail-grid { grid-template-columns:1fr; }
      .pipeline-stage { width:180px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-brand">ZELTA <span>CRM Panel</span></div>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">CSV Export</button>
      <button class="btn btn-gold btn-sm" onclick="refreshAll()">Yangilash</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="pipeline" onclick="switchTab('pipeline',this)">Voronka</div>
    <div class="tab" data-tab="table" onclick="switchTab('table',this)">Jadval</div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">Jami</div><div class="stat-value gold" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Bugun</div><div class="stat-value" id="statToday">—</div></div>
    <div class="stat-card"><div class="stat-label">Yangi</div><div class="stat-value" id="statNew" style="color:var(--blue)">—</div></div>
    <div class="stat-card"><div class="stat-label">SLA 20 daq</div><div class="stat-value" id="statSLA">—</div></div>
    <div class="stat-card"><div class="stat-label">Sotildi</div><div class="stat-value" id="statClosed" style="color:var(--green)">—</div></div>
  </div>

  <!-- ===== PIPELINE TAB ===== -->
  <div class="tab-content active" id="tab-pipeline">
    <div class="pipeline-container">
      <div class="pipeline" id="pipelineBoard"></div>
    </div>
  </div>

  <!-- ===== TABLE TAB ===== -->
  <div class="tab-content" id="tab-table">
    <div class="filters">
      <button class="filter-btn active" data-status="all" onclick="filterStatus('all',this)">Hammasi</button>
      <button class="filter-btn" data-status="new" onclick="filterStatus('new',this)">Yangi</button>
      <button class="filter-btn" data-status="render_ready" onclick="filterStatus('render_ready',this)">Rasm tayyor</button>
      <button class="filter-btn" data-status="offer_sent" onclick="filterStatus('offer_sent',this)">Taklif yuborildi</button>
      <button class="filter-btn" data-status="called" onclick="filterStatus('called',this)">Telefon qilindi</button>
      <button class="filter-btn" data-status="showroom" onclick="filterStatus('showroom',this)">Showroom</button>
      <button class="filter-btn" data-status="deposit" onclick="filterStatus('deposit',this)">Zaklad</button>
      <button class="filter-btn" data-status="closed" onclick="filterStatus('closed',this)">Sotildi</button>
      <button class="filter-btn" data-status="lost" onclick="filterStatus('lost',this)">Yo'qoldi</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Qidirish: telefon, ism, ID..." oninput="debounceSearch()">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Sana</th>
            <th>Ism</th>
            <th>Telefon</th>
            <th>Til</th>
            <th>Mebel</th>
            <th>Rasmlar</th>
            <th>Bosqich</th>
            <th>SLA Taymer</th>
            <th>Aloqa</th>
            <th>Amallar</th>
          </tr>
        </thead>
        <tbody id="leadsBody">
          <tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text3)">Yuklanmoqda...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Lead Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="leadModal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Lead</div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="confirm-overlay" id="confirmOverlay" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <h3>O'chirishni tasdiqlang</h3>
      <p id="confirmText">Bu leadni o'chirmoqchimisiz?</p>
      <div class="confirm-actions">
        <button class="btn btn-outline" onclick="closeConfirm()">Bekor qilish</button>
        <button class="btn btn-red" id="confirmDeleteBtn" onclick="confirmDelete()">O'chirish</button>
      </div>
    </div>
  </div>

  <script>
    // ===== CONFIGURATION =====
    const STAGES = [
      { key: 'new', label: 'Zayavka tushdi', color: 'var(--blue)', bg: 'var(--blue-dim)' },
      { key: 'render_ready', label: 'Rasm tayyorlandi', color: 'var(--purple)', bg: 'var(--purple-dim)' },
      { key: 'offer_sent', label: 'Taklif yuborildi', color: 'var(--cyan)', bg: 'var(--cyan-dim)' },
      { key: 'called', label: 'Telefon qilindi', color: 'var(--orange)', bg: 'var(--orange-dim)' },
      { key: 'showroom', label: "Showroomga yo'naltirildi", color: 'var(--gold)', bg: 'var(--gold-dim)' },
      { key: 'deposit', label: 'Zaklad berdi', color: 'var(--green)', bg: 'var(--green-dim)' },
      { key: 'closed', label: 'Sotildi', color: '#22c55e', bg: 'rgba(74,222,128,0.3)' },
      { key: 'lost', label: "Yo'qoldi", color: 'var(--red)', bg: 'var(--red-dim)' }
    ];

    const SLA_MINUTES = 20;
    let allLeads = [];
    let currentFilter = 'all';
    let searchTimeout = null;
    let deleteTargetId = null;
    let slaInterval = null;
    let currentModalLeadId = null;

    // ===== INIT =====
    refreshAll();
    slaInterval = setInterval(updateAllSLATimers, 1000);
    setInterval(refreshAll, 30000);

    // ===== TAB SWITCHING =====
    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    // ===== LOAD DATA =====
    async function refreshAll() {
      await loadLeads();
      await loadStats();
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        document.getElementById('statTotal').textContent = data.total || 0;
        document.getElementById('statToday').textContent = data.today || 0;
        document.getElementById('statNew').textContent = data.by_status?.new || 0;
        document.getElementById('statSLA').textContent = (data.sla_compliance || 100) + '%';
        document.getElementById('statClosed').textContent = data.by_status?.closed || 0;
      } catch(e) { console.error('Stats error:', e); }
    }

    async function loadLeads() {
      try {
        const search = document.getElementById('searchInput')?.value || '';
        const params = new URLSearchParams({ status: currentFilter, limit: 200 });
        if (search) params.set('search', search);
        const res = await fetch('/api/leads?' + params);
        const data = await res.json();
        allLeads = data.leads || [];
        renderTable(allLeads);
        renderPipeline(allLeads);
      } catch(e) {
        console.error('Load error:', e);
      }
    }

    // ===== SLA TIMER LOGIC =====
    function getSLAData(lead) {
      if (!lead.submitted_at) return { text: '—', cls: '', elapsed: 0, remaining: SLA_MINUTES * 60 };

      const submittedMs = new Date(lead.submitted_at).getTime();

      // If contacted
      if (lead.first_contact_at) {
        const contactMs = new Date(lead.first_contact_at).getTime();
        const diffSec = Math.floor((contactMs - submittedMs) / 1000);
        const mins = Math.floor(diffSec / 60);
        const secs = diffSec % 60;
        if (diffSec <= SLA_MINUTES * 60) {
          return { text: `${mins}:${String(secs).padStart(2,'0')} ✓`, cls: 'done', contacted: true };
        } else {
          const overSec = diffSec - SLA_MINUTES * 60;
          const overMin = Math.floor(overSec / 60);
          return { text: `+${overMin} daq kechikdi ✗`, cls: 'breach', contacted: true };
        }
      }

      // Not contacted yet — live timer
      const nowMs = Date.now();
      const elapsedSec = Math.floor((nowMs - submittedMs) / 1000);
      const remainingSec = (SLA_MINUTES * 60) - elapsedSec;

      if (remainingSec > 0) {
        const mins = Math.floor(remainingSec / 60);
        const secs = remainingSec % 60;
        let cls = 'green';
        if (remainingSec <= 300) cls = 'yellow'; // last 5 min
        return { text: `${mins}:${String(secs).padStart(2,'0')} qoldi`, cls, contacted: false };
      } else {
        const overSec = Math.abs(remainingSec);
        const overMin = Math.floor(overSec / 60);
        const overS = overSec % 60;
        return { text: `+${overMin}:${String(overS).padStart(2,'0')} kechikdi!`, cls: 'red', contacted: false };
      }
    }

    function updateAllSLATimers() {
      document.querySelectorAll('[data-sla-lead]').forEach(el => {
        const leadId = el.dataset.slaLead;
        const lead = allLeads.find(l => l.lead_id === leadId);
        if (!lead) return;
        const sla = getSLAData(lead);
        el.textContent = sla.text;
        el.className = 'sla-timer ' + sla.cls;
      });
    }

    // ===== RENDER PIPELINE =====
    function renderPipeline(leads) {
      const board = document.getElementById('pipelineBoard');
      board.innerHTML = STAGES.map(stage => {
        const stageLeads = leads.filter(l => l.current_status === stage.key);
        const cards = stageLeads.map(lead => {
          const name = lead.full_name || lead.telegram_username || 'Nomsiz';
          const sla = getSLAData(lead);
          const contacted = lead.first_contact_at ? true : false;
          const time = new Date(lead.created_at);
          const timeStr = time.toLocaleDateString('uz', {day:'2-digit',month:'short'}) + ' ' + time.toLocaleTimeString('uz',{hour:'2-digit',minute:'2-digit'});

          return `<div class="pipe-card" onclick="openLead('${lead.lead_id}')">
            <div class="pipe-card-name">${esc(name)}</div>
            <div class="pipe-card-phone">${esc(lead.phone_number || '—')}</div>
            <div class="pipe-card-meta">
              <span class="pipe-card-time">${timeStr}</span>
              <span class="pipe-card-sla sla-${sla.cls}" data-sla-lead="${lead.lead_id}">${sla.text}</span>
            </div>
            <div class="pipe-card-contact">
              ${contacted
                ? '<span class="contact-yes">● Aloqa chiqildi</span>'
                : '<span class="contact-no">○ Aloqa chiqilmadi</span>'}
            </div>
          </div>`;
        }).join('');

        return `<div class="pipeline-stage">
          <div class="pipeline-stage-header">
            <span class="pipeline-stage-title" style="color:${stage.color}">${stage.label}</span>
            <span class="pipeline-stage-count" style="background:${stage.bg};color:${stage.color}">${stageLeads.length}</span>
          </div>
          <div class="pipeline-stage-body">${cards || '<div style="text-align:center;padding:20px;font-size:12px;color:var(--text3)">Bo\'sh</div>'}</div>
        </div>`;
      }).join('');
    }

    // ===== RENDER TABLE =====
    function renderTable(leads) {
      const tbody = document.getElementById('leadsBody');
      if (!leads.length) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text3)">Leadlar topilmadi</td></tr>';
        return;
      }

      tbody.innerHTML = leads.map(lead => {
        const date = new Date(lead.created_at);
        const dateStr = date.toLocaleDateString('uz',{day:'2-digit',month:'short'}) + ' ' + date.toLocaleTimeString('uz',{hour:'2-digit',minute:'2-digit'});
        const name = lead.full_name || lead.telegram_username || '—';
        const stage = STAGES.find(s => s.key === lead.current_status) || STAGES[0];
        const sla = getSLAData(lead);
        const contacted = lead.first_contact_at ? true : false;

        let photoHtml = '';
        [lead.photo_1, lead.photo_2, lead.photo_3].forEach(p => {
          if (p) photoHtml += `<img src="${p}" class="photo-thumb" onclick="event.stopPropagation();window.open('${p}','_blank')">`;
        });

        return `<tr>
          <td><span class="lead-id" onclick="openLead('${lead.lead_id}')">${lead.lead_id}</span></td>
          <td>${dateStr}</td>
          <td>${esc(name)}</td>
          <td><a href="tel:${lead.phone_number}" style="color:var(--gold);text-decoration:none">${esc(lead.phone_number || '—')}</a></td>
          <td>${lead.selected_language === 'ru' ? 'RU' : 'UZ'}</td>
          <td>${esc(lead.furniture_interest || '—')}</td>
          <td><div class="photo-thumbs">${photoHtml || '—'}</div></td>
          <td><span class="badge badge-${lead.current_status}">${stage.label}</span></td>
          <td><span class="sla-timer ${sla.cls}" data-sla-lead="${lead.lead_id}">${sla.text}</span></td>
          <td>${contacted
            ? '<span style="color:var(--green);font-size:12px">● Ha</span>'
            : '<span style="color:var(--red);font-size:12px">○ Yo\'q</span>'}</td>
          <td>
            <div class="action-btns">
              <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openLead('${lead.lead_id}')" title="Tahrirlash">✎</button>
              <button class="btn btn-red btn-sm" onclick="event.stopPropagation();askDelete('${lead.lead_id}')" title="O'chirish">✕</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    // ===== OPEN LEAD DETAIL / EDIT =====
    async function openLead(id) {
      try {
        currentModalLeadId = id;
        const res = await fetch('/api/leads/' + id);
        const data = await res.json();
        const lead = data.lead;
        const stage = STAGES.find(s => s.key === lead.current_status) || STAGES[0];
        const sla = getSLAData(lead);
        const contacted = lead.first_contact_at ? true : false;

        document.getElementById('modalTitle').textContent = lead.lead_id;

        let photosHtml = '';
        [lead.photo_1, lead.photo_2, lead.photo_3].forEach(p => {
          if (p) photosHtml += `<img src="${p}" class="detail-photo" onclick="window.open('${p}','_blank')">`;
        });

        const stageOptions = STAGES.map(s =>
          `<option value="${s.key}" ${lead.current_status === s.key ? 'selected' : ''}>${s.label}</option>`
        ).join('');

        document.getElementById('modalContent').innerHTML = `
          <!-- SLA Display -->
          <div class="sla-display">
            <div class="sla-display-label">SLA TAYMER (20 daqiqa)</div>
            <div class="sla-display-timer sla-timer ${sla.cls}" data-sla-lead="${lead.lead_id}" id="modalSlaTimer">${sla.text}</div>
            <div class="sla-display-sub" style="color:var(--text3)">
              Yuborildi: ${lead.submitted_at ? new Date(lead.submitted_at).toLocaleString('uz') : '—'}
              ${lead.first_contact_at ? '<br>Aloqa: ' + new Date(lead.first_contact_at).toLocaleString('uz') : ''}
            </div>
          </div>

          <!-- Contact Toggle -->
          <div class="section-label">ALOQAGA CHIQILDIMI?</div>
          <div class="contact-toggle">
            <button class="contact-toggle-btn ${contacted ? 'active-yes' : ''}" id="contactYes" onclick="toggleContact(true)">✓ Ha, aloqa chiqildi</button>
            <button class="contact-toggle-btn ${!contacted ? 'active-no' : ''}" id="contactNo" onclick="toggleContact(false)">✗ Hali chiqilmadi</button>
          </div>

          <!-- Lead Info -->
          <div class="section-label">MIJOZ MA'LUMOTLARI</div>
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-label">Ism</div>
              <div class="detail-value">${esc(lead.full_name || '—')}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Telefon</div>
              <div class="detail-value"><a href="tel:${lead.phone_number}">${esc(lead.phone_number || '—')}</a></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Telegram</div>
              <div class="detail-value">${lead.telegram_username ? '<a href="https://t.me/' + esc(lead.telegram_username) + '" target="_blank">@' + esc(lead.telegram_username) + '</a>' : '—'}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Telegram ID</div>
              <div class="detail-value">${lead.telegram_user_id || '—'}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Til</div>
              <div class="detail-value">${lead.selected_language === 'ru' ? 'Русский' : "O'zbek"}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Mebel turi</div>
              <div class="detail-value">${esc(lead.furniture_interest || '—')}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Xona turi</div>
              <div class="detail-value">${esc(lead.room_type || '—')}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Yaratildi</div>
              <div class="detail-value">${new Date(lead.created_at).toLocaleString('uz')}</div>
            </div>
          </div>

          ${photosHtml ? '<div class="section-label">RASMLAR</div><div class="detail-photos">' + photosHtml + '</div>' : ''}

          <!-- Voronka Stage -->
          <div class="section-label">VORONKA BOSQICHI</div>
          <select class="voronka-select" id="modalStatus">${stageOptions}</select>

          <!-- Manager -->
          <div class="section-label">MENEJER</div>
          <input type="text" class="manager-input" id="modalManager" placeholder="Menejer ismi..." value="${esc(lead.manager_assigned || '')}">

          <!-- Notes -->
          <div class="section-label">IZOHLAR</div>
          <textarea class="notes-area" id="modalNotes" placeholder="Izoh qo'shing...">${esc(lead.notes || '')}</textarea>

          <!-- Actions -->
          <div class="modal-actions">
            <button class="btn btn-gold" onclick="saveLead('${lead.lead_id}')">Saqlash</button>
            <button class="btn btn-red" onclick="closeModal();askDelete('${lead.lead_id}')">O'chirish</button>
            <button class="btn btn-outline" onclick="closeModal()">Yopish</button>
          </div>

          <!-- Status History -->
          ${data.status_log && data.status_log.length ? `
            <div class="section-label">STATUS TARIXI</div>
            <div class="status-history">
              ${data.status_log.map(l => {
                const oldLabel = STAGES.find(s => s.key === l.old_status)?.label || l.old_status || '—';
                const newLabel = STAGES.find(s => s.key === l.new_status)?.label || l.new_status;
                return `<div class="status-history-item">
                  <span>${new Date(l.changed_at).toLocaleString('uz')}</span>
                  <span class="arrow">${oldLabel} → ${newLabel}</span>
                  ${l.changed_by ? '<span style="color:var(--text3)">(' + esc(l.changed_by) + ')</span>' : ''}
                </div>`;
              }).join('')}
            </div>
          ` : ''}
        `;

        document.getElementById('modalOverlay').classList.add('open');
      } catch(e) {
        console.error('Open lead error:', e);
      }
    }

    // ===== CONTACT TOGGLE =====
    let modalContactState = null;
    function toggleContact(yes) {
      modalContactState = yes;
      document.getElementById('contactYes').className = 'contact-toggle-btn' + (yes ? ' active-yes' : '');
      document.getElementById('contactNo').className = 'contact-toggle-btn' + (!yes ? ' active-no' : '');
    }

    // ===== SAVE LEAD =====
    async function saveLead(id) {
      try {
        const status = document.getElementById('modalStatus').value;
        const notes = document.getElementById('modalNotes').value;
        const manager = document.getElementById('modalManager').value;

        const body = { status, notes, manager_assigned: manager };

        // If contact toggled to yes and wasn't before, mark first_contact_at
        if (modalContactState === true) {
          body.mark_contacted = true;
        }

        await fetch('/api/leads/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        closeModal();
        refreshAll();
      } catch(e) {
        console.error('Save error:', e);
      }
    }

    // ===== DELETE =====
    function askDelete(id) {
      deleteTargetId = id;
      document.getElementById('confirmText').textContent = `"${id}" leadni o'chirmoqchimisiz? Bu amalni qaytarib bo'lmaydi.`;
      document.getElementById('confirmOverlay').classList.add('open');
    }

    async function confirmDelete() {
      if (!deleteTargetId) return;
      try {
        await fetch('/api/leads/' + deleteTargetId, { method: 'DELETE' });
        closeConfirm();
        closeModal();
        refreshAll();
      } catch(e) {
        console.error('Delete error:', e);
      }
    }

    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('open');
      deleteTargetId = null;
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      currentModalLeadId = null;
      modalContactState = null;
    }

    // ===== FILTER =====
    function filterStatus(status, btn) {
      currentFilter = status;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadLeads();
    }

    function debounceSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(loadLeads, 400);
    }

    // ===== EXPORT =====
    function exportCSV() {
      window.open('/api/export/csv', '_blank');
    }

    // ===== HELPERS =====
    function esc(s) {
      if (!s) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
